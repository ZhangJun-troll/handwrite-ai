<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HandWrite AI</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf8f5;--paper:#fff;--ink:#1a1a2e;--accent:#e94560;--muted:#666;--line:#e8e4de}
body{font-family:'Ma Shan Zheng',cursive;background:var(--bg);color:var(--ink);height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--paper);border-bottom:1px solid var(--line);flex-shrink:0}
header h1{font-size:22px;font-family:'ZCOOL XiaoWei',serif;font-weight:400}
header .dots{display:flex;gap:6px}
header .dot{width:8px;height:8px;border-radius:50%;background:var(--line)}
header .dot.active{background:var(--accent)}

.chat{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.msg{margin-bottom:20px;max-width:90%;animation:fadeUp .3s ease}
.msg.user{margin-left:auto}
.msg .label{font-size:11px;color:var(--muted);margin-bottom:4px;font-family:system-ui}
.msg .bubble{padding:14px 18px;border-radius:16px;line-height:1.8;font-size:18px;position:relative}
.msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg.ai .bubble{background:var(--paper);border:1px solid var(--line);border-bottom-left-radius:4px;font-family:'Ma Shan Zheng',cursive;font-size:22px;line-height:2}

.msg.ai .bubble .char{display:inline-block;transition:opacity .05s}
.msg.ai .bubble .char.new{opacity:0;animation:charIn .3s ease forwards}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes charIn{from{opacity:0}to{opacity:1}}

.input-area{flex-shrink:0;background:var(--paper);border-top:1px solid var(--line)}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--line)}
.toolbar button{background:none;border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:13px;color:var(--muted);cursor:pointer;font-family:system-ui;transition:all .2s}
.toolbar button:hover,.toolbar button.active{border-color:var(--accent);color:var(--accent)}
.toolbar .spacer{flex:1}
.toolbar .char-count{font-size:11px;color:var(--muted);font-family:system-ui}

.canvas-wrap{position:relative;background:#fff}
canvas{display:block;width:100%;touch-action:none;cursor:crosshair}
.canvas-placeholder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#ccc;font-size:18px;font-family:'Ma Shan Zheng',cursive;pointer-events:none;transition:opacity .3s}
.canvas-wrap.has-stroke .canvas-placeholder{opacity:0}

.send-bar{display:flex;align-items:center;gap:8px;padding:8px 12px}
.send-bar input{flex:1;border:1px solid var(--line);border-radius:20px;padding:10px 16px;font-size:15px;font-family:system-ui;outline:none;transition:border-color .2s}
.send-bar input:focus{border-color:var(--accent)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.send-btn:active{transform:scale(.9)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}

.mode-tabs{display:flex;padding:0 12px}
.mode-tab{flex:1;text-align:center;padding:10px;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;font-family:system-ui;transition:all .2s}
.mode-tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.status{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;font-family:system-ui;opacity:0;transition:opacity .3s;pointer-events:none;z-index:10}
.status.show{opacity:1}

.settings{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:flex-end;justify-content:center}
.settings.show{display:flex}
.settings-panel{background:var(--paper);width:100%;max-width:500px;border-radius:20px 20px 0 0;padding:24px;max-height:70vh;overflow-y:auto}
.settings-panel h2{font-size:18px;margin-bottom:16px;font-family:system-ui}
.settings-panel label{display:block;margin-bottom:12px;font-size:14px;font-family:system-ui}
.settings-panel label span{display:block;margin-bottom:4px;color:var(--muted);font-size:12px}
.settings-panel input,.settings-panel select{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px;font-size:14px;font-family:system-ui;outline:none}
.settings-panel input:focus{border-color:var(--accent)}
.settings-panel .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px;width:100%;font-size:16px;cursor:pointer;margin-top:12px;font-family:system-ui}
.settings-panel .btn-secondary{background:var(--line);color:var(--ink)}

/* Paper lines */
.canvas-wrap{background-image:repeating-linear-gradient(transparent,transparent 31px,var(--line) 31px,var(--line) 32px);background-position:0 8px}
</style>
</head>
<body>

<header>
  <h1>✍️ HandWrite AI</h1>
  <div class="dots"><div class="dot active"></div><div class="dot" onclick="openSettings()"></div></div>
</header>

<div class="status" id="status"></div>

<div class="chat" id="chat">
  <div class="msg ai">
    <div class="label">AI</div>
    <div class="bubble">你好！在下方手写或输入文字，我来回复你 ✍️</div>
  </div>
</div>

<div class="input-area">
  <div class="mode-tabs">
    <div class="mode-tab active" onclick="switchMode('draw')">✍️ 手写</div>
    <div class="mode-tab" onclick="switchMode('type')">⌨️ 键盘</div>
  </div>

  <div id="draw-panel">
    <div class="toolbar">
      <button onclick="undoStroke()" id="btn-undo">↩ 撤销</button>
      <button onclick="clearCanvas()">🗑 清空</button>
      <span class="spacer"></span>
      <span class="char-count" id="stroke-count">0 笔</span>
    </div>
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="canvas" height="200"></canvas>
      <div class="canvas-placeholder">在这里写字...</div>
    </div>
    <div class="send-bar">
      <button class="send-btn" onclick="sendDrawing()" id="btn-send-draw">➤</button>
    </div>
  </div>

  <div id="type-panel" style="display:none">
    <div class="send-bar">
      <input type="text" id="text-input" placeholder="输入文字..." onkeydown="if(event.key==='Enter')sendText()">
      <button class="send-btn" onclick="sendText()" id="btn-send-text">➤</button>
    </div>
  </div>
</div>

<div class="settings" id="settings" onclick="if(event.target===this)closeSettings()">
  <div class="settings-panel">
    <h2>⚙️ API 设置</h2>
    <label><span>API 地址</span>
      <input id="cfg-url" placeholder="https://integrate.api.nvidia.com/v1/chat/completions">
    </label>
    <label><span>API Key</span>
      <input id="cfg-key" type="password" placeholder="nvapi-...">
    </label>
    <label><span>视觉模型（手写识别）</span>
      <input id="cfg-vision" placeholder="nvidia/nemotron-nano-12b-v2-vl">
    </label>
    <label><span>文本模型（AI回复）</span>
      <input id="cfg-text" placeholder="nvidia/nemotron-nano-12b-v2-vl">
    </label>
    <button class="btn" onclick="saveSettings()">保存</button>
    <button class="btn btn-secondary" onclick="closeSettings()" style="margin-top:8px">取消</button>
  </div>
</div>

<script>
// ═══════════════ CONFIG ═══════════════
var CFG=JSON.parse(localStorage.getItem('hw_cfg')||'null')||{
  url:'https://integrate.api.nvidia.com/v1/chat/completions',
  key:'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',
  vision:'nvidia/nemotron-nano-12b-v2-vl',
  text:'nvidia/nemotron-nano-12b-v2-vl'
};
if(!localStorage.getItem('hw_cfg'))localStorage.setItem('hw_cfg',JSON.stringify(CFG));

// ═══════════════ CANVAS ═══════════════
var cv=document.getElementById('canvas');
var ctx=cv.getContext('2d');
var strokes=[],curStroke=[];
var drawing=false;
var DPR=window.devicePixelRatio||1;

function resizeCanvas(){
  var w=cv.parentElement.clientWidth;
  cv.width=w*DPR;cv.height=200*DPR;
  cv.style.width=w+'px';cv.style.height='200px';
  ctx.scale(DPR,DPR);
  ctx.lineCap='round';ctx.lineJoin='round';ctx.strokeStyle='#1a1a2e';
  redrawAll();
}
window.addEventListener('resize',resizeCanvas);
resizeCanvas();

function getPos(e){
  var r=cv.getBoundingClientRect();
  var t=e.touches?e.touches[0]:e;
  return{x:t.clientX-r.left,y:t.clientY-r.top};
}

cv.addEventListener('pointerdown',function(e){
  drawing=true;
  curStroke=[];
  var p=getPos(e);
  curStroke.push(p);
  ctx.beginPath();ctx.moveTo(p.x,p.y);
  document.getElementById('canvas-wrap').classList.add('has-stroke');
});
cv.addEventListener('pointermove',function(e){
  if(!drawing)return;
  var p=getPos(e);
  curStroke.push(p);
  ctx.lineWidth=2+Math.random()*1.5;
  ctx.lineTo(p.x,p.y);ctx.stroke();
  ctx.beginPath();ctx.moveTo(p.x,p.y);
});
cv.addEventListener('pointerup',function(){
  if(!drawing)return;
  drawing=false;
  if(curStroke.length>1)strokes.push(curStroke.slice());
  curStroke=[];
  document.getElementById('stroke-count').textContent=strokes.length+' 笔';
});
cv.addEventListener('pointerleave',function(){drawing=false});

function redrawAll(){
  ctx.clearRect(0,0,cv.width/DPR,cv.height/DPR);
  for(var s=0;s<strokes.length;s++){
    var st=strokes[s];
    if(st.length<2)continue;
    ctx.beginPath();ctx.moveTo(st[0].x,st[0].y);
    for(var i=1;i<st.length;i++){
      ctx.lineWidth=2+Math.random()*1.5;
      ctx.lineTo(st[i].x,st[i].y);ctx.stroke();
      ctx.beginPath();ctx.moveTo(st[i].x,st[i].y);
    }
  }
}
function undoStroke(){strokes.pop();redrawAll();document.getElementById('stroke-count').textContent=strokes.length+' 笔';}
function clearCanvas(){strokes=[];redrawAll();document.getElementById('stroke-count').textContent='0 笔';document.getElementById('canvas-wrap').classList.remove('has-stroke');}

// ═══════════════ MODE SWITCH ═══════════════
function switchMode(m){
  document.querySelectorAll('.mode-tab').forEach(function(t,i){
    t.classList.toggle('active',(m==='draw'&&i===0)||(m==='type'&&i===1));
  });
  document.getElementById('draw-panel').style.display=m==='draw'?'block':'none';
  document.getElementById('type-panel').style.display=m==='type'?'block':'none';
}

// ═══════════════ CHAT ═══════════════
var chatHistory=[];
var chatEl=document.getElementById('chat');

function addMsg(role,text,isStreaming){
  var div=document.createElement('div');
  div.className='msg '+role;
  var label=document.createElement('div');
  label.className='label';
  label.textContent=role==='user'?'你':'AI';
  var bubble=document.createElement('div');
  bubble.className='bubble';
  if(role==='ai'&&!isStreaming){
    renderHandwrite(bubble,text);
  }else{
    bubble.textContent=text;
  }
  div.appendChild(label);div.appendChild(bubble);
  chatEl.appendChild(div);
  chatEl.scrollTop=chatEl.scrollHeight;
  return bubble;
}

function renderHandwrite(el,text){
  el.innerHTML='';
  for(var i=0;i<text.length;i++){
    var span=document.createElement('span');
    span.className='char new';
    span.textContent=text[i];
    span.style.animationDelay=(i*30)+'ms';
    // Random slight rotation for handwriting feel
    var rot=(Math.random()-0.5)*4;
    var dy=(Math.random()-0.5)*3;
    span.style.transform='rotate('+rot+'deg) translateY('+dy+'deg)';
    el.appendChild(span);
  }
}

function showStatus(msg,timeout){
  var el=document.getElementById('status');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(showStatus._t);
  showStatus._t=setTimeout(function(){el.classList.remove('show');},timeout||3000);
}

// ═══════════════ API CALLS ═══════════════
function callVision(base64){
  return new Promise(function(resolve,reject){
    var body={
      model:CFG.vision,
      messages:[{role:'user',content:[
        {type:'text',text:'请识别图片中的手写文字，只返回识别出的文字内容，不要添加任何解释或标点符号以外的格式。如果看不清就猜。'},
        {type:'image_url',image_url:{url:'data:image/png;base64,'+base64}}
      ]}],
      max_tokens:500,
      temperature:0.1
    };
    fetch(CFG.url,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+CFG.key},
      body:JSON.stringify(body)
    }).then(function(r){return r.json();}).then(function(d){
      var content=d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content;
      resolve(content||'');
    }).catch(reject);
  });
}

function callAI(userText){
  return new Promise(function(resolve,reject){
    chatHistory.push({role:'user',content:userText});
    var body={
      model:CFG.text,
      messages:[
        {role:'system',content:'你是一个手写笔记助手。用户会用手写方式和你交流。请用简洁、自然的口语化中文回复，像在笔记本上写笔记一样。回复不要太长，控制在2-4句话。不要用markdown格式。'},
      ].concat(chatHistory),
      max_tokens:500,
      temperature:0.7
    };
    fetch(CFG.url,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+CFG.key},
      body:JSON.stringify(body)
    }).then(function(r){return r.json();}).then(function(d){
      var content=d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content;
      if(content)chatHistory.push({role:'assistant',content:content});
      resolve(content||'（无响应）');
    }).catch(reject);
  });
}

// ═══════════════ SEND ═══════════════
async function sendDrawing(){
  if(strokes.length<2){showStatus('请先写几个字');return;}
  var btn=document.getElementById('btn-send-draw');
  btn.disabled=true;

  // Export canvas to base64
  var tmpCv=document.createElement('canvas');
  tmpCv.width=cv.width;tmpCv.height=cv.height;
  var tmpCtx=tmpCv.getContext('2d');
  tmpCtx.fillStyle='#fff';tmpCtx.fillRect(0,0,tmpCv.width,tmpCv.height);
  tmpCtx.drawImage(cv,0,0);
  var b64=tmpCv.toDataURL('image/png').split(',')[1];

  addMsg('user','[手写输入]',false);
  clearCanvas();
  showStatus('🔍 识别中...');

  try{
    var recognized=await callVision(b64);
    recognized=recognized.trim();
    if(!recognized){showStatus('未能识别文字');btn.disabled=false;return;}
    showStatus('识别: '+recognized);

    // Update last user message
    var userMsgs=chatEl.querySelectorAll('.msg.user .bubble');
    userMsgs[userMsgs.length-1].textContent=recognized;

    showStatus('🤔 思考中...');
    var reply=await callAI(recognized);
    addMsg('ai',reply,false);
    showStatus('✅');
  }catch(e){
    showStatus('❌ '+e.message,5000);
  }
  btn.disabled=false;
}

async function sendText(){
  var input=document.getElementById('text-input');
  var text=input.value.trim();
  if(!text)return;
  input.value='';
  var btn=document.getElementById('btn-send-text');
  btn.disabled=true;

  addMsg('user',text,false);
  showStatus('🤔 思考中...');

  try{
    var reply=await callAI(text);
    addMsg('ai',reply,false);
    showStatus('✅');
  }catch(e){
    showStatus('❌ '+e.message,5000);
  }
  btn.disabled=false;
}

// ═══════════════ SETTINGS ═══════════════
function openSettings(){
  document.getElementById('cfg-url').value=CFG.url;
  document.getElementById('cfg-key').value=CFG.key;
  document.getElementById('cfg-vision').value=CFG.vision;
  document.getElementById('cfg-text').value=CFG.text;
  document.getElementById('settings').classList.add('show');
}
function closeSettings(){document.getElementById('settings').classList.remove('show');}
function saveSettings(){
  CFG.url=document.getElementById('cfg-url').value.trim();
  CFG.key=document.getElementById('cfg-key').value.trim();
  CFG.vision=document.getElementById('cfg-vision').value.trim();
  CFG.text=document.getElementById('cfg-text').value.trim();
  localStorage.setItem('hw_cfg',JSON.stringify(CFG));
  closeSettings();
  showSettings('✅ 已保存');
}
</script>
</body>
</html>
